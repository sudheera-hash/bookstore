{% extends "base.html" %}
{% block title %}Add Book — Admin{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
  <h1>Add New Book</h1>
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-dark">← Back to Dashboard</a>
</div>

<div class="form-card" style="max-width:620px;">
  <form method="POST" action="{{ url_for('add_book') }}">

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" placeholder="Book title" required />
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" name="author" placeholder="Author name" required />
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-group">
        <label>Genre</label>
        <select name="genre">
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Science">Science</option>
          <option value="Technology">Technology</option>
          <option value="History">History</option>
          <option value="Biography">Biography</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Mystery">Mystery</option>
          <option value="Romance">Romance</option>
          <option value="Self-Help">Self-Help</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" name="price" placeholder="9.99" step="0.01" min="0" required />
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-group">
        <label>Stock</label>
        <input type="number" name="stock" placeholder="50" min="0" required />
      </div>
      <div class="form-group">
        <label>Cover Image URL</label>
        <input type="text" name="cover_url" placeholder="https://..." />
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Write a short description of the book..."></textarea>
    </div>

    <button type="submit" class="btn btn-green" style="width:100%; padding:0.75rem;">
      Add Book
    </button>

  </form>
</div>
{% endblock %}
