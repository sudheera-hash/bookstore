{% extends "base.html" %}
{% block title %}Login — BookStore{% endblock %}

{% block content %}
<h1 style="text-align:center;">Login</h1>

<div class="form-card">
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn btn-dark" style="width:100%; padding:0.75rem;">
      Login
    </button>
  </form>

  <p style="text-align:center; margin-top:1.25rem; font-size:0.88rem; color:#888;">
    Don't have an account?
    <a href="{{ url_for('register') }}" style="color:#3B6D11;">Register here</a>
  </p>
</div>
{% endblock %}
